name: windows-install-smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/install-windows.ps1"
      - "scripts/test-install-windows.ps1"
      - ".github/workflows/windows-install-smoke.yml"
      - "docs/windows.md"
      - "packaging/scoop/**"
      - "packaging/winget/**"

permissions:
  contents: read

jobs:
  install:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test Windows installer
        shell: pwsh
        run: ./scripts/test-install-windows.ps1

      - name: Validate Scoop manifest JSON
        shell: pwsh
        run: Get-Content ./packaging/scoop/ocgo.json | ConvertFrom-Json | Out-Null

      - name: Validate WinGet manifests
        shell: pwsh
        run: |
          $root = "./packaging/winget/manifests/u/UlrichZogo/OCGO/0.1.0"
          Get-ChildItem $root -Filter *.yaml | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            $null = [System.Management.Automation.Language.Parser]::ParseInput($content, [ref]$null, [ref]$errors)
            if ($errors.Count -gt 0) {
              Write-Error "YAML parse errors in $($_.Name): $($errors -join '; ')"
              exit 1
            }
            Write-Host "$($_.Name): valid"
          }
