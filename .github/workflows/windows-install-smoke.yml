name: windows-install-smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/install-windows.ps1"
      - "scripts/test-install-windows.ps1"
      - ".github/workflows/windows-install-smoke.yml"
      - "docs/windows.md"
      - "packaging/scoop/**"
      - "packaging/winget/**"

permissions:
  contents: read

jobs:
  install:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test Windows installer
        shell: pwsh
        run: ./scripts/test-install-windows.ps1

      - name: Validate Scoop manifest JSON
        shell: pwsh
        run: Get-Content ./packaging/scoop/ocgo.json | ConvertFrom-Json | Out-Null

      - name: Validate WinGet manifests if available
        shell: pwsh
        run: |
          $manifestDir = "./packaging/winget/manifests/u/UlrichZogo/OCGO/0.1.0"

          if (-not (Test-Path (Join-Path $manifestDir "UlrichZogo.OCGO.yaml"))) { throw "Missing OCGO.yaml" }
          if (-not (Test-Path (Join-Path $manifestDir "UlrichZogo.OCGO.installer.yaml"))) { throw "Missing installer.yaml" }
          if (-not (Test-Path (Join-Path $manifestDir "UlrichZogo.OCGO.locale.en-US.yaml"))) { throw "Missing locale.yaml" }

          if (Get-Command winget -ErrorAction SilentlyContinue) {
            $out = winget validate $manifestDir 2>&1
            $text = ($out | Out-String)
            Write-Host $text

            $ec = $LASTEXITCODE

            if ($ec -eq 0) {
              Write-Host "winget validate completed."
              exit 0
            }

            $hasValidationSuccess =
              $text -match "Manifest validation succeeded" -or
              $text -match "Validation succeeded" -or
              $text -match "succeeded with warnings"

            $hasKnownSchemaWarning =
              $text -match "Schema header not found"

            $hasHardError =
              $text -match "(?i)\berror\b" -or
              $text -match "(?i)\bfailed\b" -or
              $text -match "(?i)\binvalid\b"

            if ($hasValidationSuccess -and $hasKnownSchemaWarning -and -not $hasHardError) {
              Write-Host "winget validate returned non-zero but only known schema-header warning was detected."
              exit 0
            }

            Write-Error "winget validate failed with exit code $ec."
            exit $ec
          } else {
            Write-Host "winget is not available; skipping winget validate."
          }
