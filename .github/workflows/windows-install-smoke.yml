name: windows-install-smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/install-windows.ps1"
      - "scripts/test-install-windows.ps1"
      - ".github/workflows/windows-install-smoke.yml"
      - "docs/windows.md"
      - "packaging/scoop/**"
      - "packaging/winget/**"

permissions:
  contents: read

jobs:
  install:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test Windows installer
        shell: pwsh
        run: ./scripts/test-install-windows.ps1

      - name: Validate Scoop manifest JSON
        shell: pwsh
        run: Get-Content ./packaging/scoop/ocgo.json | ConvertFrom-Json | Out-Null

      - name: Validate WinGet manifests
        shell: pwsh
        run: |
          $root = "./packaging/winget/manifests/u/UlrichZogo/OCGO/0.1.0"
          $checks = @{
            "UlrichZogo.OCGO.yaml"              = @("PackageIdentifier: UlrichZogo.OCGO", "PackageVersion: 0.1.0", "ManifestType: version")
            "UlrichZogo.OCGO.installer.yaml"    = @("PackageIdentifier: UlrichZogo.OCGO", "InstallerType: zip", "InstallerSha256: 08b3a7cd284e2f65e3439c353d296312d597f19c99866666a56039f6ac28afc4", "InstallerSha256: bd0084a1e37dd5b23d6720ba2a911386c3b7ef873753c3364ed15f39cbbe1741")
            "UlrichZogo.OCGO.locale.en-US.yaml" = @("PackageIdentifier: UlrichZogo.OCGO", "PackageLocale: en-US", "ShortDescription: Use OpenCode Go with Claude Code")
          }
          $ok = $true
          foreach ($f in $checks.Keys) {
            $path = Join-Path $root $f
            if (-not (Test-Path $path)) { Write-Error "Missing: $f"; $ok = $false; continue }
            $content = Get-Content $path -Raw
            foreach ($key in $checks[$f]) {
              if ($content -notmatch [regex]::Escape($key)) {
                Write-Error "$f missing expected content: $key"
                $ok = $false
              }
            }
            if ($ok) { Write-Host "$f: valid" }
          }
          if (-not $ok) { exit 1 }
