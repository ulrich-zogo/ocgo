name: release-smoke

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify, e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: read

env:
  GITHUB_REPOSITORY: ulrich-zogo/ocgo
  HOMEBREW_TAP_REPO: ulrich-zogo/homebrew-tap

jobs:
  verify-release-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "${{ inputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --dir dist

      - name: Verify release artifacts
        run: ./scripts/verify-release-artifacts.sh "${{ inputs.tag }}" dist

  verify-homebrew-formula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone Homebrew tap
        run: git clone "https://github.com/${HOMEBREW_TAP_REPO}.git" tap

      - name: Verify Homebrew formula
        run: ./scripts/verify-homebrew-formula.sh "${{ inputs.tag }}" tap/Formula/ocgo.rb

  brew-install:
    runs-on: macos-latest
    steps:
      - name: Tap fork-owned Homebrew repo
        run: brew tap ulrich-zogo/tap https://github.com/ulrich-zogo/homebrew-tap

      - name: Install ocgo
        run: brew install ocgo

      - name: Verify binary
        run: |
          which ocgo
          ocgo --help
          ocgo version || true
          ocgo version --json || true

      - name: Verify model catalog
        run: ocgo models

      - name: Verify doctor
        run: ocgo doctor || true
